<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordinator Dashboard</title>
    <link rel="stylesheet" href="/static/coordinatordash.css">
    <!-- <link rel="stylesheet" href="/static/style.css" /> -->
    <!-- Font Awesome Cdn Link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
</head>

<body>

    <div class="container">
        <h2>Coordinator Dashboard</h2>
        <form id="companyForm" action="/coordinatordash" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="companyName">Company Name :</label>
                <input type="text" id="companyName" name="companyName" required>
            </div>
            <div class="form-group">
                <label for="companyDescription">Description :</label>
                <input type="text" id="companyDescription" name="companyDescription" required>
            </div>
            <div class="form-group">
                <label for="companyRole">Role:</label>
                <input type="text" id="companyRole" name="companyRole" required>
            </div>
            <div class="form-group">
                <label for="registrationLink">Registration Link :</label>
                <input type="link" id="registrationLink" name="registrationLink" required>
            </div>
            <div class="form-group">
                <label for="stud_branch">Branch :</label>
                <input type="text" id="stud_branch" name="stud_branch" required>
            </div>
            <div class="form-group">
                <label for="dueDate">Due Date :</label>
                <input type="text" id="dueDate" name="dueDate" required>
            </div>
            <div class="form-group">
                <input type="submit" value="Add Company">
            </div>
        </form>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>No.</th>
                        <th>Company Name</th>
                        <th>Role</th>
                        <th>Description</th>
                        <th>Branch</th>
                        <th>Due Date</th>
                    </tr>
                </thead>

                <tbody>
                    {% for index, offer in enumerate(offers): %}
                    <tr>
                        <td>{{ index + 1 }}</td>
                        <td>{{ offer['name'].strip() }}</td>
                        <td>{{ offer['role'].strip() }}</td>
                        <td>{{ offer['description'].strip() }}</td>
                        <td>{{ offer['branch'].strip() }}</td>
                        <td>{{ offer['due_date'].strip() }}</td>
                    </tr>
                    {% endfor %}

                </tbody>

            </table>
        </div>

    </div>

    <script src="/static/coordinatordash.js"></script>
</body>

</html>
