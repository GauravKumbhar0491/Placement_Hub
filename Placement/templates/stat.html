    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(drawVisualization);

      function drawVisualization() {
        // Some raw data (not necessarily accurate)
        var data = google.visualization.arrayToDataTable([
          ['Year', 'CS-IT', 'AI', 'ENTC', 'Electrical', 'Mechanical', 'Average'],
          ['2019/20',  90,      20,         22,             10,           2,      28.8],
          ['2020/21',  80,      25,        20,             7,          5,      27.4],
          ['2021/22',  75,      24,        23,             13,           3,      27.8],
          ['2022/23',  63,      27,        16,             6,           7,      23.8],
          ]);

        var options = {
          title : 'Last four year Placed Students',
          vAxis: {title: 'No. of Students'},
          hAxis: {title: 'Year'},
          seriesType: 'bars',
          series: {5: {type: 'line'}}
        };

        var chart = new google.visualization.ComboChart(document.getElementById('chart_div'));
        chart.draw(data, options);
      }
    </script>

<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load("current", {packages:["corechart"]});
      google.charts.setOnLoadCallback(drawChart);
      function drawChart() {
        var data = google.visualization.arrayToDataTable([
          ['Branch', 'Placed Student'],
          ['CS_IT',     86],
          ['AI',     27],
          ['ENTC',  22],
          ['Electrical', 12],
          ['Mechanical',   7]
        ]);

        var options = {
          title: 'My Daily Activities',
          pieHole: 0.4,
        };

        var chart = new google.visualization.PieChart(document.getElementById('donutchart'));
        chart.draw(data, options);
      }
    </script>

<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
<script type="text/javascript">
  google.charts.load('current', {'packages':['corechart']});
  google.charts.setOnLoadCallback(drawChart);

  function drawChart() {
    var data = google.visualization.arrayToDataTable([
      ['Year', 'Placed Girls', 'Placed Boys'],
      ['2018',  25,      119],
      ['2019',  30,      107],
      ['2020',  28,       111],
      ['2022',  22,      97]
    ]);

    var options = {
      title: 'Student Performance',
      curveType: 'function',
      legend: { position: 'bottom' }
    };

    var chart = new google.visualization.LineChart(document.getElementById('curve_chart'));

    chart.draw(data, options);
  }
</script>

<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['table']});
      google.charts.setOnLoadCallback(drawTable);

      function drawTable() {
        var data = new google.visualization.DataTable();
        data.addColumn('string', 'Name');
        data.addColumn('number', 'Salary');
        data.addColumn('boolean', 'Full Time Employee');
        data.addRows([
          ['xyz',  {v: 12, f: '$12'}, true],
          ['xyz',   {v:18,   f: '$18'}, true],
          ['xyze', {v: 10, f: '$10'}, true],
          ['xyz',   {v: 9,  f: '$9'},  false]
        ]);

        var table = new google.visualization.Table(document.getElementById('table_div'));

        table.draw(data, {showRowNumber: true, width: '100%', height: '100%'});
      }
    </script>
